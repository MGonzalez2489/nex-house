services:
  # Base de Datos MySQL
  db:
    image: mysql:8.0
    container_name: db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - '${DB_PORT}:3306'
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - nex-house-network
    healthcheck:
      test:
        [
          'CMD',
          'mysqladmin',
          'ping',
          '-h',
          'localhost',
          '-u${DB_USER}',
          '-p${DB_PASSWORD}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: ./docker/api.dockerfile
    container_name: nex-house-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
    ports:
      - '3000:3000'
    networks:
      - nex-house-network
    volumes:
      - nexhouse_uploads:${UPLOAD_DIR:-/app/uploads}

  web:
    build:
      context: .
      dockerfile: ./docker/web.dockerfile
    container_name: nex-house-web
    depends_on:
      - api
    ports:
      - '4200:4200'
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      IS_DOCKER: true
      API_URL: http://localhost:3000
    networks:
      - nex-house-network

networks:
  nex-house-network:
    driver: bridge

volumes:
  db_data:
  nexhouse_uploads:
    driver: local

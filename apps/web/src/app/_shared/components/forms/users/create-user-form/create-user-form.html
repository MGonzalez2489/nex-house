<form [formGroup]="form" (ngSubmit)="doSubmit()" class="flex flex-col gap-y-4">
  <!-- name -->
  <div class="flex flex-col gap-2 form-control">
    <label for="fName" class="form-label">Nombre</label>
    <input
      pInputText
      id="fName"
      formControlName="firstName"
      placeholder="Ej. John"
      fluid
      [invalid]="form.controls.firstName.invalid && form.controls.firstName.touched"
    />
    <app-form-validation-error
      [touched]="form.controls.firstName.touched"
      [errors]="form.controls.firstName.errors"
      label="Nombre"
    />
  </div>
  <!-- email -->
  <div class="flex flex-col gap-2 form-control">
    <label for="email" class="form-label">Email</label>
    <input
      pInputText
      id="email"
      formControlName="email"
      placeholder="john@doe.com"
      fluid
      [invalid]="form.controls.email.invalid && form.controls.email.touched"
    />
    <app-form-validation-error
      [touched]="form.controls.email.touched"
      [errors]="form.controls.email.errors"
      label="Email"
    />
  </div>
  <!-- Unit -->
  @if(isNewUnit()){
  <p-panel formGroupName="unit" class="bg-gray-50">
    <ng-template #header>
      <div class="flex items-center gap-2">
        <span
          >Crear una nueva unidad o buscar una<p-button
            label="existente"
            text
            severity="info"
            (click)="isNewUnit.set(false)"
            [pt]="{root:'p-0 px-1'}"
        /></span>
      </div>
    </ng-template>

    <div class="flex flex-col gap-2 md:col-span-2 form-control">
      <label class="form-label" for="streetName">Calle / Privada / Torre</label>
      <input
        pInputText
        id="streetName"
        formControlName="streetName"
        placeholder="Ej. Privada Maple"
        fluid
      />
      <app-form-validation-error
        [touched]="form.controls.unit.controls.streetName.touched"
        [errors]="form.controls.unit.controls.streetName.errors"
        label="Calle"
      />
    </div>
    <div class="flex flex-col gap-2 md:col-span-2 animate-fade-in form-control">
      <label class="form-label" for="identifier">Número / Identificador</label>
      <input
        pInputText
        id="identifier"
        formControlName="identifier"
        placeholder="Ej. Casa 10, Depto 4B"
        fluid
      />
      <app-form-validation-error
        [touched]="form.controls.unit.controls.identifier.touched"
        [errors]="form.controls.unit.controls.identifier.errors"
        label="Identificador"
      />
    </div>
  </p-panel>
  } @else{

  <div class="flex flex-col gap-2 form-control">
    <div class="flex items-center justify-between">
      <label for="fName" class="form-label">Unidad</label>
      <p-button
        text="true"
        label="Crear"
        severity="info"
        tabIndex="-1"
        [style]="{ 'tabindex': '-1' }"
        [attr.tabindex]="-1"
        [pt]="{
       root: { class: 'p-0',tabindex: '-1' },
       host: { tabindex: '-1' }
  }"
        (click)="isNewUnit.set(true)"
      />
    </div>
    <p-autoComplete
      formControlName="unitId"
      [suggestions]="unitStore.suggestions()"
      (completeMethod)="searchUnit($event)"
      forceSelection="true"
      placeholder="Busca por calle o número..."
      optionLabel="identifier"
      optionValue="publicId"
      [emptyMessage]="'No se encontró la unidad. Presiona Enter para crearla.'"
      fluid
    >
      <ng-template let-unit pTemplate="item">
        <div class="flex flex-col">
          <span class="font-bold text-sm">{{ unit.streetName }}</span>
          <small class="text-slate-500">ID: {{ unit.identifier }}</small>
        </div>
      </ng-template>
      <ng-template let-unit pTemplate="empty">
        <div class="flex flex-col">
          <span
            >No se encontraron resultados.
            <p-button text="true" label="Crear" (click)="isNewUnit.set(true)"
          /></span>
        </div>
      </ng-template>
    </p-autoComplete>

    <app-form-validation-error
      [touched]="form.controls.unitId.touched"
      [errors]="form.controls.unitId.errors"
      label="Unidad"
    />
  </div>
  }

  <div class="flex items-center flex-col">
    <span class="text-white hidden md:block"> ..</span>
    <div
      class="form-control flex items-center justify-between gap-4 p-3 bg-slate-50 rounded-md border border-dashed border-slate-200 w-full"
    >
      <label for="role" class="text-sm font-medium text-slate-600"
        >¿Es Administrador?</label
      >
      <p-toggleswitch formControlName="isAdmin" size="large" />
    </div>
  </div>

  <div class="pt-4 border-t border-slate-100">
    <app-form-options
      [isLoading]="store.loading()"
      [callState]="store.callState()"
      (doCancel)="doCancel()"
    />
  </div>
</form>

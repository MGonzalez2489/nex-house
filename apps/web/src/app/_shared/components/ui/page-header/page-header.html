<header class="mb-4 md:mb-8 animate-fadein">
  <app-breadcrumbs />
  <div
    class="flex flex-col md:flex-row md:items-center justify-between md:gap-6"
  >
    <div class="space-y-1.5 flex-1 min-w-0">
      <h1
        class="text-2xl md:text-3xl lg:text-4xl font-black text-slate-900 tracking-tight truncate"
      >
        {{ title() }}
      </h1>

      @if (subTitle()) {
        <p
          [class.hidden]="!showSubTitleOnSM()"
          [class.md:block]="!showSubTitleOnSM()"
          class="text-slate-500 text-sm md:text-base max-w-2xl leading-relaxed"
        >
          {{ subTitle() }}
        </p>
      }
    </div>

    <div
      #actionsContainer
      [class.hidden]="!showActionsOnSM()"
      [class.md:block]="!showActionsOnSM()"
    >
      <ng-content select="[actions]"></ng-content>
    </div>
  </div>
</header>

<header class="mb-8 animate-fadein">
  <app-breadcrumbs />
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
    <div class="space-y-1.5 flex-1 min-w-0">
      <h1
        class="text-2xl md:text-3xl lg:text-4xl font-black text-slate-900 tracking-tight truncate"
      >
        {{ title() }}
      </h1>

      @if (subTitle()) {
      <p class="text-slate-500 text-sm md:text-base max-w-2xl leading-relaxed">
        {{ subTitle() }}
      </p>
      }
    </div>

    @if(actionsContainer.children.length > 0){

    <div
      class="flex items-center gap-3 w-full md:w-auto overflow-x-auto pb-2 md:pb-0"
    >
      <ng-content select="[actions]"></ng-content>
    </div>
    }

    <div #actionsContainer>
      <ng-content select="[actions]"></ng-content>
    </div>
  </div>
</header>

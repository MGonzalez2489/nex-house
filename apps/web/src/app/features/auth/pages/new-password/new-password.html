@if(!store.recoveryToken()){
<form
  [formGroup]="codeForm"
  (ngSubmit)="sendCode()"
  class="flex flex-col items-center"
>
  <div class="font-bold text-xl mb-2">Authenticate Your Account</div>
  <p class="text-muted-color block mb-8">
    Please enter the code sent to your phone.
  </p>
  <p-inputotp
    [length]="8"
    formControlName="code"
    [invalid]="codeForm.controls.code.invalid && codeForm.controls.code.touched"
    [attr.aria-invalid]="codeForm.controls.code.invalid && codeForm.controls.code.touched"
    [attr.aria-describedby]="codeForm.controls.code.touched && codeForm.controls.code.errors ? 'code-error' : null"
  >
  </p-inputotp>

  <app-form-validation-error
    class="mt-3"
    [touched]="codeForm.controls.code.touched"
    [errors]="codeForm.controls.code.errors"
    label="Codigo"
  />

  <div class="block my-5">
    <app-form-options
      [submitLabel]="'Enviar Codigo'"
      class="w-full"
      [callState]="store.callState()"
      [isLoading]="store.loading()"
      [showCancel]="false"
    />
  </div>

  <p-button
    fluid
    label="Regresar"
    severity="secondary"
    [link]="true"
    class="w-full"
    [routerLink]="['/auth/login']"
  />
</form>
} @else{

<form [formGroup]="pwdForm" (ngSubmit)="sendPwd()" class="space-y-6">
  <div class="form-control">
    <div class="flex justify-between items-center ml-1">
      <label for="password" class="form-label">Contraseña</label>
    </div>
    <p-password
      id="password"
      formControlName="password"
      [feedback]="false"
      [toggleMask]="true"
      fluid
      autocomplete="off"
      [invalid]="pwdForm.controls.password.invalid && pwdForm.controls.password.touched"
      [attr.aria-invalid]="pwdForm.controls.password.invalid && pwdForm.controls.password.touched"
      [attr.aria-describedby]="pwdForm.controls.password.touched && pwdForm.controls.password.errors ? 'password-error' : null"
    ></p-password>
    <app-form-validation-error
      id="password-error"
      [touched]="pwdForm.controls.password.touched"
      [errors]="pwdForm.controls.password.errors"
      label="Password"
    />
  </div>
  <div class="form-control">
    <div class="flex justify-between items-center ml-1">
      <label for="confirmPwd" class="form-label">Confirmar Contraseña</label>
    </div>
    <p-password
      id="confirmPwd"
      formControlName="confirmPassword"
      [feedback]="false"
      [toggleMask]="true"
      fluid
      autocomplete="off"
      [invalid]="pwdForm.controls.confirmPassword.invalid && pwdForm.controls.confirmPassword.touched"
      [attr.aria-invalid]="pwdForm.controls.confirmPassword.invalid && pwdForm.controls.confirmPassword.touched"
      [attr.aria-describedby]="pwdForm.controls.confirmPassword.touched && pwdForm.controls.confirmPassword.errors ? 'confirmPassword-error' : null"
    ></p-password>
    <app-form-validation-error
      id="confirm-password-error"
      [touched]="pwdForm.controls.confirmPassword.touched"
      [errors]="pwdForm.controls.confirmPassword.errors"
      label="confirmPassword-error"
    />
  </div>

  <div class="w-full flex justify-center">
    <app-form-options
      [submitLabel]="'Guardar'"
      [callState]="store.callState()"
      [isLoading]="store.loading()"
      [showCancel]="false"
    />
  </div>

  <p-button
    fluid
    label="Regresar"
    severity="secondary"
    [link]="true"
    class="w-full"
    [routerLink]="['/auth/login']"
  />
</form>

}

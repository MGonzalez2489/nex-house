<div
  class="flex flex-col md:flex-row gap-3 justify-between md:items-center pb-4"
>
  <app-page-header
    title="Areas Residenciales"
    subTitle="Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore..."
  />

  <p-button
    label="Nueva area residencial"
    fluid
    icon="pi pi-plus"
    (click)="addNeighborhoods()"
  />
</div>

<div class="space-y-6">
  <app-neighborhoods-stats class="block" />

  <app-neighborhoods-list
    class="block md:hidden"
    [isLoading]="store.loading()"
    [data]="store.entities()"
  />
  <app-neighborhoods-table
    class="hidden md:block"
    (filter)="search($event)"
    [isLoading]="store.loading()"
    [data]="store.entities()"
  />
</div>

<p-confirmDialog />
<div class="space-y-6">
  <p-card>
    <app-users-table
      [isLoading]="store.loading()"
      [users]="store.entities()"
      [pagination]="store.pagination() "
      (filter)="search($event)"
      (add)="addUser()"
      (update)="updateUser($event)"
      (remove)="removeUser($event)"
    />
  </p-card>
</div>

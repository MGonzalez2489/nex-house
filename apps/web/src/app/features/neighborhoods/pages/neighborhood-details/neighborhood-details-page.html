<div
  class="flex items-center justify-between gap-6 pb-6 border-b border-slate-200"
>
  <div>
    <div
      class="text-sm font-medium text-slate-500 flex items-center gap-2 mb-1"
    >
      <a href="#" class="hover:text-primary-600">Fraccionamientos</a>
      <i class="pi pi-angle-right text-[10px]"></i>
    </div>
    <h1 class="text-3xl font-extrabold text-slate-950 tracking-tight">
      Quintas San Miguel
    </h1>
    <p class="text-slate-600 mt-1 flex items-center gap-2">
      <i class="pi pi-map-marker text-danger-500"></i>
      Av. San Miguel #123, Chihuahua, Chih.
    </p>
  </div>
</div>

<div class="space-y-6">
  <div class="border-b border-slate-200">
    <p-tabs [value]="activeItem?.routerLink">
      <p-tablist [pt]="{root:'bg-transparent'}">
        @for (tab of items; track tab.routerLink) {
        <p-tab
          [value]="tab.routerLink"
          (click)="activeItem = tab"
          [routerLink]="[tab.routerLink]"
          class="flex items-center gap-2! text-inherit"
        >
          <i class="text-sm text-gray-500" [class]="tab.icon"></i>
          <span class="text-sm text-gray-500">{{ tab.label }}</span>
        </p-tab>
        }
      </p-tablist>
    </p-tabs>

    <nav class="-mb-px space-x-8 hidden" aria-label="Tabs">
      <a
        href="#"
        class="border-primary-600 text-primary-600 flex items-center gap-2.5 py-4 px-1 border-b-2 font-semibold text-sm whitespace-nowrap"
        aria-current="page"
      >
        <i class="pi pi-th-large text-base"></i>
        Vista General
      </a>
      <a
        href="#"
        class="border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300 flex items-center gap-2.5 py-4 px-1 border-b-2 font-medium text-sm whitespace-nowrap transition-colors"
      >
        <i class="pi pi-home text-base"></i>
        Casas (Unidades)
      </a>
      <a
        href="#"
        class="border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300 flex items-center gap-2.5 py-4 px-1 border-b-2 font-medium text-sm whitespace-nowrap transition-colors"
      >
        <i class="pi pi-users text-base"></i>
        Usuarios & Admins
      </a>
      <a
        href="#"
        class="border-transparent text-slate-500 hover:text-slate-700 hover:border-slate-300 flex items-center gap-2.5 py-4 px-1 border-b-2 font-medium text-sm whitespace-nowrap transition-colors"
      >
        <i class="pi pi-file text-base"></i>
        Reportes & Pagos
      </a>
    </nav>
  </div>
  <router-outlet></router-outlet>
</div>

<p-card>
  <p-table
    #dt
    [value]="data()"
    [lazy]="true"
    (onLazyLoad)="search($event)"
    [paginator]="true"
    [rows]="10"
    [totalRecords]="pagination()?.total || 0"
    [loading]="isLoading()"
    [showCurrentPageReport]="true"
    currentPageReportTemplate="Showing {first} to {last} of {totalRecords}"
    [rowsPerPageOptions]="[10, 20, 50]"
  >
    <ng-template pTemplate="caption">
      <div class="flex flex-col md:flex-row justify-between items-center gap-4">
        <p></p>
        <span class="p-input-icon-left w-full md:w-80">
          <input
            pInputText
            variant="filled"
            class="w-full"
            placeholder="Search by name or address..."
            (input)="dt.filterGlobal($any($event.target).value, 'contains')"
          />
        </span>
      </div>
    </ng-template>

    <ng-template #header>
      <tr>
        <th
          pSortableColumn="name"
          class="bg-slate-50 text-xs font-bold uppercase text-slate-600"
        >
          Nombre <p-sortIcon field="name" />
        </th>
        <th
          pSortableColumn="address"
          class="bg-slate-50 text-xs font-bold uppercase text-slate-600"
        >
          Ficha <p-sortIcon field="address" />
        </th>
        <th
          pSortableColumn="totalSlots"
          class="bg-slate-50 text-xs font-bold uppercase text-slate-600"
        >
          Direccion <p-sortIcon field="totalSlots" />
        </th>
        <th class="bg-slate-50 text-xs font-bold uppercase text-slate-600">
          Actions
        </th>
      </tr>
    </ng-template>

    <ng-template #body let-neighborhood>
      <tr class="hover:bg-blue-50/30 transition-colors">
        <td class="text-sm font-semibold text-slate-700">
          {{ neighborhood.name }}
        </td>
        <td class="text-sm text-slate-600">{{ neighborhood.slug }}</td>
        <td class="text-sm text-slate-600">{{ neighborhood.address }}</td>
        <td>
          <div class="flex gap-1">
            <p-button
              icon="pi pi-search"
              [text]="true"
              severity="info"
              pTooltip="View Details"
              [routerLink]="[neighborhood.publicId]"
            />
            <!-- <p-button -->
            <!--   icon="pi pi-pencil" -->
            <!--   [text]="true" -->
            <!--   severity="secondary" -->
            <!--   pTooltip="Edit neighborhood" -->
            <!-- /> -->
            <!-- <p-button -->
            <!--   icon="pi pi-trash" -->
            <!--   [text]="true" -->
            <!--   severity="danger" -->
            <!--   pTooltip="Delete neighborhood" -->
            <!-- /> -->
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="4" class="text-center py-8 text-slate-400">
          <i class="pi pi-neighborhood text-4xl mb-3 block"></i>
          No neighborhoods found. Click "New Building" to start.
        </td>
      </tr>
    </ng-template>
  </p-table>
</p-card>

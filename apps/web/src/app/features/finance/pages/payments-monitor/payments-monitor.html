<div class="space-y-6">
  <app-page-header
    class="block"
    title="Monitor de cobros"
    subTitle="Control centralizado de cuotas, vencimientos y estatus de pago."
  />

  @if(store.chargesSummary(); as summary){

  <app-charges-summary class="block" [summary]="summary" />
  }

  <p-card>
    <app-charges-filters (filter)="search($event)" />
  </p-card>
  <p-card>
    <app-charges-table
      [data]="store.chargesEntities()"
      [isLoading]="store.loading()"
      [pagination]="store.chargesPagination()"
      (confirm)="confirm($event)"
      (cancelCharge)="cancelCharge($event)"
      (view)="view($event)"
    />
  </p-card>
</div>

<div class="space-y-6">
  <!-- HEADER -->
  <app-page-header
    title="Control Financiero"
    subTitle="Seguimiento de todos los movimientos del fraccionamiento."
  >
    @if(existsRecords()){
    <div actions class="flex items-center gap-4">
      <p-overlaybadge [value]="filterCount()">
        <p-button
          icon="pi pi-filter"
          severity="secondary"
          (click)="changeFilters()"
        />
      </p-overlaybadge>
      <p-button
        label="Nuevo Movimiento"
        icon="pi pi-plus"
        (click)="addMovement()"
      />
    </div>
    }
  </app-page-header>

  @if(!existsRecords()){
  <app-cash-transaction-init (add)="addMovement()" />
  } @else{

  <!-- MOCK -->
  <!-- Quick Stats Cards -->
  <app-cash-summary class="block" [summary]="store.transactionsSummary()" />

  <app-cash-filters-chips
    class="block"
    [filters]="store.transactionsFilters()"
    (removeFilter)="removeFilter($event)"
  />
  <!-- Timeline Journal -->
  <app-cash-movement-list
    class="block"
    [records]="store.transactionsByDate()"
    [isLoading]="store.transactionsLoading()"
  />
  }
</div>

<div class="space-y-6">
  <!-- HEADER -->
  <app-page-header
    title="Control Financiero"
    subTitle="Seguimiento de todos los movimientos del fraccionamiento."
  >
    <div actions>
      <p-button
        label="Nuevo Movimiento"
        icon="pi pi-plus"
        (click)="addMovement()"
      />
    </div>
  </app-page-header>

  <!-- MOCK -->
  <!-- Quick Stats Cards -->
  <app-cash-summary class="block" />

  <!-- Filters & Search -->
  <app-cash-filters class="block" />

  <!-- Timeline Journal -->
  <app-cash-movement-list class="block" />

  <!-- Empty State (Optional Hint) -->
  <div class="text-center py-12">
    <p class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.3em]">
      Fin del historial reciente
    </p>
  </div>
</div>

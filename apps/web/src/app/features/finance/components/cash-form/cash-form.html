<form class="space-y-6 mt-1" [formGroup]="form" (ngSubmit)="doSubmit()">
  <!-- type -->
  <p-selectbutton
    [options]="movementOptions"
    [unselectable]="false"
    [allowEmpty]="false"
    formControlName="type"
    optionLabel="key"
    optionValue="value"
    fluid
  >
    <ng-template #item let-item>
      <div class="flex gap-2 items-center">
        <span
          [class.bg-rose-500]="item.value === 'expense'"
          [class.bg-emerald-500]="item.value === 'income'"
          class="rounded-full size-3"
        ></span>
        <p>{{item.key}}</p>
      </div>
    </ng-template>
  </p-selectbutton>

  <!-- Title -->
  <div class="form-control">
    <label for="title" class="form-label required">Titulo</label>
    <input
      formControlName="title"
      variant="filled"
      pInputText
      id="title"
      placeholder="Ej. Pago de luz"
      type="text"
      fluid
      [invalid]="form.controls.title.invalid && form.controls.title.touched"
      [attr.aria-invalid]="form.controls.title.invalid && form.controls.title.touched"
      [attr.aria-describedby]="form.controls.title.touched && form.controls.title.errors ? 'title-error' : null"
    />

    <app-form-validation-error
      id="title-errors"
      [touched]="form.controls.title.touched"
      [errors]="form.controls.title.errors"
      label="Titulo"
    />
  </div>
  <!-- amount / date -->
  <div class="grid grid-cols-2 gap-4">
    <!-- Amount -->
    <div class="form-control">
      <label for="amount" class="form-label required">Monto total</label>
      <p-inputnumber
        formControlName="amount"
        [min]="0"
        fluid
        variant="filled"
        mode="currency"
        currency="MXN"
        [pt]="{pcInputText:{root: form.value.type === 'expense'? 'text-rose-500':'text-emerald-600'}}"
        [invalid]="form.controls.amount.invalid && form.controls.amount.touched"
        [attr.aria-invalid]="form.controls.amount.invalid && form.controls.amount.touched"
        [attr.aria-describedby]="form.controls.amount.touched && form.controls.amount.errors ? 'amount-error' : null"
      />
      <app-form-validation-error
        id="amount-errors"
        [touched]="form.controls.amount.touched"
        [errors]="form.controls.amount.errors"
        label="Monto"
      />
    </div>

    <!-- Date -->
    <div class="form-control">
      <label for="date" class="form-label">Fecha efectiva</label>
      <p-datepicker
        [showIcon]="true"
        formControlName="transactionDate"
        inputId="date"
        variant="filled"
        [showOnFocus]="false"
        fluid
        [invalid]="form.controls.transactionDate.invalid && form.controls.transactionDate.touched"
        [attr.aria-invalid]="form.controls.transactionDate.invalid && form.controls.transactionDate.touched"
        [attr.aria-describedby]="form.controls.transactionDate.touched && form.controls.transactionDate.errors ? 'date-error' : null"
      />
      <app-form-validation-error
        id="date-errors"
        [touched]="form.controls.transactionDate.touched"
        [errors]="form.controls.transactionDate.errors"
        label="Fecha efectiva"
      />
    </div>
  </div>

  <!-- Category -->
  <div class="form-control">
    <div class="flex justify-between">
      <label for="category" class="form-label required">Categoria</label>
      <p class="text-xs text-gray-500">
        Varia segun el tipo de movimiento (ingreso/gasto)
      </p>
    </div>
    <app-transaction-category-select
      [allowedType]="selType()"
      formControlName="category"
    />
  </div>

  <div class="form-control">
    <label for="description" class="form-label required"
      >Concepto / Descripción</label
    >
    <textarea
      variant="filled"
      formControlName="description"
      rows="5"
      fluid
      pTextarea
      placeholder="Ej. Pago de servicio de limpieza para calles principales"
      [invalid]="form.controls.description.invalid && form.controls.description.touched"
      [attr.aria-invalid]="form.controls.description.invalid && form.controls.description.touched"
      [attr.aria-describedby]="form.controls.description.touched && form.controls.description.errors ? 'description-error' : null"
    ></textarea>
    <app-form-validation-error
      id="description-errors"
      [touched]="form.controls.description.touched"
      [errors]="form.controls.description.errors"
      label="Descripción"
    />
  </div>

  <!-- Description -formControlName->


  <!-- Evidence -->
  <!-- Área de Carga de Archivos (Simulación de p-fileUpload) -->
  <div class="flex flex-col">
    <div class="form-control">
      <p class="form-label">Evidencia (Comprobante)</p>
      <div
        class="border-2 border-dashed border-slate-300 rounded-lg p-6 text-center hover:border-blue-400 transition-colors bg-slate-50 relative"
      >
        <input
          type="file"
          (change)="onFileSelect($event)"
          accept="image/*,application/pdf"
          class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
        />

        @if(!selectedFile){

        <div class="space-y-2">
          <span class="text-3xl text-slate-400">📎</span>
          <p class="text-sm text-slate-500">
            Haz clic o arrastra para subir un archivo
          </p>
          <p class="text-xs text-slate-400">PNG, JPG o PDF (Máx. 5MB)</p>
        </div>

        } @else{

        <div
          class="flex items-center justify-center space-x-2 text-blue-600 font-medium"
        >
          <span>📄</span>
          <span>{{ selectedFile.name }}</span>
          <button
            type="button"
            (click)="removeFile($event)"
            class="text-red-500 hover:text-red-700 ml-2"
          >
            ✕
          </button>
        </div>
        }
      </div>
    </div>
  </div>

  <!-- options -->
  <app-form-options [callState]="store.callState()" (doCancel)="doCancel()" />
</form>

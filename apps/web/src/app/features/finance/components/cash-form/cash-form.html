<form class="space-y-6 mt-1" [formGroup]="form" (ngSubmit)="doSubmit()">
  <!-- Movimiento Type -->
  <p-selectbutton
    [options]="movementOptions"
    [unselectable]="false"
    formControlName="type"
    optionLabel="key"
    optionValue="value"
    fluid
  >
    <ng-template #item let-item>
      <div class="flex gap-2 items-center">
        <span
          [class.bg-rose-500]="item.value === 'expense'"
          [class.bg-emerald-500]="item.value === 'income'"
          class="rounded-full size-3"
        ></span>
        <p class="font-medium">{{item.key}}</p>
      </div>
    </ng-template>
  </p-selectbutton>

  <!-- Title -->
  <div class="form-control">
    <label for="title" class="form-label required">Título</label>
    <input
      #titleInput
      pInputText
      id="title"
      formControlName="title"
      variant="filled"
      placeholder="Ej. Pago de luz"
      fluid
      [invalid]="form.controls.title.invalid && form.controls.title.touched"
    />
    <app-form-validation-error
      [touched]="form.controls.title.touched"
      [errors]="form.controls.title.errors"
      label="Título"
    />
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <!-- Amount -->
    <div class="form-control">
      <label for="amount" class="form-label required">Monto total</label>
      <p-inputnumber
        formControlName="amount"
        [min]="0"
        fluid
        variant="filled"
        mode="currency"
        currency="MXN"
        locale="es-MX"
        [pt]="{ pcInputText: { root: selType() === 'expense' ? 'text-rose-500 font-bold' : 'text-emerald-600 font-bold' } }"
        [invalid]="form.controls.amount.invalid && form.controls.amount.touched"
      />
      <app-form-validation-error
        [touched]="form.controls.amount.touched"
        [errors]="form.controls.amount.errors"
        label="Monto"
      />
    </div>

    <!-- Date -->
    <div class="form-control">
      <label for="date" class="form-label">Fecha efectiva</label>
      <p-datepicker
        formControlName="transactionDate"
        inputId="date"
        variant="filled"
        [showIcon]="true"
        [showOnFocus]="false"
        fluid
        [invalid]="form.controls.transactionDate.invalid && form.controls.transactionDate.touched"
      />
      <app-form-validation-error
        [touched]="form.controls.transactionDate.touched"
        [errors]="form.controls.transactionDate.errors"
        label="Fecha"
      />
    </div>
  </div>

  <!-- Category Select -->
  <div class="form-control">
    <div class="flex justify-between items-end mb-1">
      <label for="category" class="form-label required m-0">Categoría</label>
      <span
        class="text-[10px] uppercase tracking-wider text-slate-400 font-semibold"
      >
        {{ selType() === 'expense' ? 'Gastos' : 'Ingresos' }}
      </span>
    </div>
    <app-transaction-category-select
      id="category"
      [allowedType]="selType()"
      formControlName="category"
    />
    <app-form-validation-error
      [touched]="form.controls.category.touched"
      [errors]="form.controls.category.errors"
      label="Categoría"
    />
  </div>

  <!-- Description -->
  <div class="form-control">
    <label for="description" class="form-label required"
      >Concepto / Descripción</label
    >
    <textarea
      pTextarea
      id="description"
      formControlName="description"
      variant="filled"
      rows="3"
      fluid
      placeholder="Detalles de la transacción..."
      [invalid]="form.controls.description.invalid && form.controls.description.touched"
    ></textarea>
    <app-form-validation-error
      [touched]="form.controls.description.touched"
      [errors]="form.controls.description.errors"
      label="Descripción"
    />
  </div>

  <!-- Evidence (Upload) -->
  <div class="form-control">
    <p class="form-label font-semibold mb-2">Evidencia (Comprobante)</p>

    <div
      class="relative border-2 border-dashed rounded-xl transition-all duration-200 p-4 text-center overflow-hidden"
      [class]="selectedFile() ? 'border-primary bg-primary/5' : 'border-slate-300 hover:border-primary bg-slate-50'"
    >
      <!-- Input oculto que cubre toda el área -->
      <input
        type="file"
        (change)="onFileSelect($event)"
        accept="image/*,application/pdf"
        class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10"
        title=""
      />

      @if (!selectedFile()) {
      <div class="flex flex-col items-center py-4">
        <i class="pi pi-cloud-upload text-4xl text-slate-400 mb-2"></i>
        <p class="text-sm text-slate-600 font-medium">Haz clic para subir</p>
        <p class="text-xs text-slate-400">PDF, PNG o JPG (Máx. 5MB)</p>
      </div>
      } @else {
      <div
        class="flex items-center justify-between gap-3 bg-white p-3 rounded-lg border border-primary/20 shadow-sm relative z-20"
      >
        <div class="flex items-center gap-3 min-w-0">
          <div class="bg-primary/10 p-2 rounded">
            <i
              [class]="selectedFile()?.type === 'application/pdf' ? 'pi pi-file-pdf text-rose-500' : 'pi pi-image text-blue-500'"
              class="text-xl"
            ></i>
          </div>
          <div class="text-left min-w-0">
            <p class="text-sm font-bold text-slate-700 truncate">
              {{ selectedFile()?.name }}
            </p>
            <p class="text-[10px] text-slate-400 font-bold uppercase">
              {{selectedFile()?.size | fileSize}}
            </p>
          </div>
        </div>

        <p-button
          type="button"
          (click)="removeFile($event)"
          severity="danger"
          variant="outlined"
          rounded
          label="Eliminar archivo"
          icon="pi pi-trash"
        >
        </p-button>
      </div>
      }
    </div>
  </div>

  <app-form-options [callState]="store.callState()" (doCancel)="doCancel()" />
</form>

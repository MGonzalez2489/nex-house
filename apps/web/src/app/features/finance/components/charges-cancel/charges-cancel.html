<form [formGroup]="form" (submit)="doSubmit()">
  <div class="flex flex-col gap-4 py-2">
    <div class="bg-red-50 border-l-4 border-red-500 p-3 flex items-start gap-3">
      <i class="pi pi-exclamation-triangle text-red-500 text-xl mt-1"></i>
      <div>
        <p class="text-xs font-bold text-red-700 uppercase">Atención</p>
        <p class="text-[11px] text-red-600">
          Esta acción anulará la deuda de forma permanente.
        </p>
      </div>
    </div>

    @if (charge(); as charge) {
    <div class="border border-slate-200 rounded-lg p-3 bg-slate-50">
      <p class="text-[10px] font-bold text-slate-400 uppercase">
        Cargo a cancelar
      </p>
      <p class="text-sm font-bold text-slate-700">{{ charge.description }}</p>
      <p class="text-lg font-black text-slate-900 mt-1">
        {{ charge.amount | currency }}
      </p>
    </div>
    }

    <div class="form-control">
      <label for="cancelReason" class="form-label required"
        >Motivo de Cancelación
      </label>
      <textarea
        rows="3"
        cols="30"
        fluid
        pTextarea
        id="cancelReason"
        formControlName="cancelReason"
        [invalid]="form.controls.cancelReason.invalid && form.controls.cancelReason.touched"
        [attr.aria-invalid]="form.controls.cancelReason.invalid && form.controls.cancelReason.touched"
        [attr.aria-describedby]="form.controls.cancelReason.touched && form.controls.cancelReason.errors ? 'approvalNotes-error' : null"
      ></textarea>

      <app-form-validation-error
        id="cancelReason-errors"
        [touched]="form.controls.cancelReason.touched"
        [errors]="form.controls.cancelReason.errors"
        label="Motivo de Cancelación"
      />
    </div>
  </div>

  <app-form-options
    [callState]="store.callState()"
    submitSeverity="danger"
    (doCancel)="doCancel()"
    [isLoading]="store.loading()"
    submitLabel="Cancelar"
  />
</form>

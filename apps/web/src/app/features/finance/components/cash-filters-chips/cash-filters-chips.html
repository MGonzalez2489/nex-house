<div class="flex flex-wrap gap-2 items-center">
  <span class="text-[10px] font-bold text-slate-400 uppercase mr-2 ml-1"
    >Filtros activos:</span
  >
  @for(c of chips(); track c.key){

  <p-chip
    [label]="c.label"
    [class.bg-blue-50]="!c.permanent"
    [class.border-blue-100]="!c.permanent"
    [class.text-blue-600]="!c.permanent"
    class="border font-bold"
    [removable]="!c.permanent"
    [icon]="c.icon"
    [pt]="{icon:'text-inherit',removeIcon:'text-inherit'}"
    (onRemove)="remove(c)"
  />
  }

  <!-- <button class="text-[10px] font-bold text-blue-500 hover:underline ml-2"> -->
  <!--   Limpiar todos -->
  <!-- </button> -->
</div>

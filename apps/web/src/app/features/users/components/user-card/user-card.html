<p-card>
  <div class="flex items-start space-x-8 relative z-10">
    <div
      class="w-32 h-32 rounded-2xl overflow-hidden shadow-lg border-4 border-white"
    >
      <img
        alt="Resident avatar"
        class="w-full h-full object-cover"
        data-alt="portrait of a confident hispanic man with a friendly smile, outdoor urban background with modern architecture"
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuBE8myGSrnmPOrf5ODYd0Z0HYTqTtlg2Q2V0zq52mNkpIcWmpP3cojulWIXw8_4iV07HdQG8gciLJEbEVTxFPp2aA6G89wSn5t0VAtjoKnY9zl3QJsIa2l_pKmmPXy4QSNLti4f1mudZJYu9rYDgCt7CC-3UTFM92NAkLIlkjD9WubMuldnQnIKTWMmpevMDps3gcSj5BgIQqIPQrE9Wcye3s6zpplIUF81GPS_8qZbKdcsoXE9VOkxmS6lKx7e56aVvjEHgDfGaVq1"
      />
    </div>
    <div class="flex-1 grid grid-cols-2 gap-y-6 gap-x-12">
      <div>
        <p
          class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-1"
        >
          Nombre Completo
        </p>
        <p class="text-lg font-semibold">{{user().fullName}}</p>
      </div>
      <div>
        <p
          class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-1"
        >
          Estatus
        </p>
        <app-user-status-tag
          [status]="user().status"
          mode="label"
          size="small"
        />
      </div>
      <div>
        <p
          class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-1"
        >
          Correo Electrónico
        </p>
        <p class="text-on-surface/80">{{user().email}}</p>
      </div>
      <div>
        <p
          class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-1"
        >
          Teléfono
        </p>
        <p class="text-on-surface/80">{{user().phone}}</p>
      </div>
      <div>
        <p
          class="block text-xs font-bold text-on-surface-variant uppercase tracking-widest mb-1"
        >
          Rol
        </p>
        <app-role-tag [role]="user().role" />
      </div>
    </div>
  </div>
  <!-- Decorative architectural element -->
  <!-- <div class="absolute -right-8 -bottom-8 opacity-5"> -->
  <!--   <span class="material-symbols-outlined text-[160px]">apartment</span> -->
  <!-- </div> -->
</p-card>

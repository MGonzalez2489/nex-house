<div class="space-y-4">
  @for(user of users(); track user.publicId){
  <p-card (click)="inspect.emit(user)">
    <div class="flex items-center justify-between">
      <div class="flex items-center w-full gap-2">
        <app-user-avatar [text]="user.fullName" [size]="'large'" />
        <div class="">
          <p class="font-bold text-base leading-tight">{{user.fullName}}</p>
          <p class="text-[11px] mb-1">{{user.email}}</p>

          <div class="flex items-center gap-2">
            <app-role-tag
              [role]="user.role"
              [size]="'small'"
              [rounded]="true"
            />
            <app-user-status-tag [mode]="'label'" [status]="user.status" />
          </div>
        </div>
      </div>
      <div class="flex flex-col justify-center">
        <i class="pi pi-chevron-right text-gray-400"></i>
      </div>
    </div>
  </p-card>
  }
</div>

@if(user(); as user){
<app-page-header [title]="user.fullName" class="capitalize">
  <div actions class="flex gap-2">
    <p-button label="Editar" variant="outlined" routerLink="update" />
    <p-button label="Borrar Usuario" severity="danger" variant="outlined" />
  </div>
</app-page-header>

<!-- Bento Grid Content -->
<div class="grid grid-cols-12 gap-6">
  <!-- Profile Section -->
  <div class="col-span-12 lg:col-span-8">
    <app-user-card [user]="user" class="" />
    <div class="md:hidden flex gap-3 items-center py-3">
      <p-button
        icon="pi pi-trash"
        label="Borrar"
        fluid
        class="w-full"
        severity="danger"
        variant="outlined"
      />
      <p-button
        routerLink="update"
        icon="pi pi-pencil"
        label="Editar"
        fluid
        class="w-full"
      />
    </div>
  </div>
  <app-user-unit-card class="col-span-12 lg:col-span-4" [user]="user" />
</div>
}

<p-confirmDialog />
<div class="space-y-6 pb-25 md:pb-0">
  <app-page-header
    title="Usuarios & Admins"
    subTitle=" Gestión centralizada de residentes y administradores del fraccionamiento, permitiendo el control de roles y estados de registro."
  >
    <div actions class="flex gap-2">
      <p-button label="Nuevo Usuario" icon="pi pi-plus" (click)="addUser()" />
    </div>
  </app-page-header>

  <app-users-filters class="block" (filter)="search($event)" />

  <app-users-list
    class="md:hidden"
    [isLoading]="store.loading()"
    [users]="store.entities()"
    (inspect)="inspect($event)"
  />
  <p-card class="hidden md:block">
    <app-users-table
      [isLoading]="store.loading()"
      [users]="store.entities()"
      [pagination]="store.pagination() "
      (filter)="search($event)"
      (inspect)="inspect($event)"
    />
  </p-card>

  <p-button
    icon="pi pi-plus"
    (click)="addUser()"
    rounded
    size="large"
    class="fixed z-1000 bottom-15 right-10 md:hidden"
  />
</div>

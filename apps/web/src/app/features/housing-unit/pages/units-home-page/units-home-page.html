<div class="space-y-6 pb-25 md:pb-0">
  <app-page-header
    title="Inventario de Unidades"
    subTitle="Gestiona las propiedades y sus habitantes vinculados."
  >
  </app-page-header>

  <p-card>
    <app-unit-filters />
  </p-card>

  <p-card>
    <app-units-table
      [isLoading]="store.loading()"
      [units]="store.entities()"
      [pagination]="store.pagination() "
      (filter)="search($event)"
    />
  </p-card>
</div>

<div
  class="bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden hidden"
>
  <table class="w-full text-left border-collapse">
    <thead class="bg-slate-50 border-b border-slate-200 text-slate-600">
      <tr>
        <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider">
          Propiedad
        </th>
        <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider">
          Tipo
        </th>
        <th class="px-6 py-4 text-xs font-bold uppercase tracking-wider">
          Habitante Principal
        </th>
        <th
          class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-center"
        >
          Estatus
        </th>
        <th
          class="px-6 py-4 text-xs font-bold uppercase tracking-wider text-right"
        >
          Acciones
        </th>
      </tr>
    </thead>
    <tbody class="divide-y divide-slate-100">
      <tr class="hover:bg-slate-50/50 transition-colors group">
        <td class="px-6 py-4">
          <div class="flex items-center gap-3">
            <div class="relative">
              <div
                class="h-10 w-10 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center border border-indigo-100"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-5 w-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
                    stroke-width="2"
                  />
                </svg>
              </div>
              <span class="absolute -top-1 -right-1 flex h-3 w-3">
                <span
                  class="animate-ping absolute inline-flex h-full w-full rounded-full bg-amber-400 opacity-75"
                ></span>
                <span
                  class="relative inline-flex rounded-full h-3 w-3 bg-amber-500 border-2 border-white"
                ></span>
              </span>
            </div>
            <div class="flex flex-col">
              <span class="font-bold text-slate-700">Calle Roble 124</span>
              <span
                class="text-[10px] text-amber-600 font-semibold uppercase tracking-wider"
                >Arrendada</span
              >
            </div>
          </div>
        </td>

        <td class="px-6 py-4">
          <div class="flex flex-col gap-1">
            <div class="flex -space-x-2 overflow-hidden">
              <div
                class="inline-block h-8 w-8 rounded-full ring-2 ring-white bg-blue-100 flex items-center justify-center text-xs font-bold text-blue-700"
              >
                JD
              </div>
              <div
                class="inline-block h-8 w-8 rounded-full ring-2 ring-white bg-slate-100 flex items-center justify-center text-[10px] font-bold text-slate-500"
              >
                +2
              </div>
            </div>
            <span class="text-xs text-slate-500"
              >John Doe
              <span class="text-slate-300 italic">(Inquilino)</span></span
            >
          </div>
        </td>

        <td class="px-6 py-4">
          <div class="flex flex-col border-l-2 border-slate-100 pl-3">
            <span class="text-[10px] font-bold text-slate-400 uppercase"
              >Propietario</span
            >
            <span class="text-sm text-slate-600 font-medium"
              >Sr. Ricardo Milos</span
            >
            <a href="tel:..." class="text-[10px] text-blue-500 hover:underline"
              >Llamar al dueño</a
            >
          </div>
        </td>

        <td class="px-6 py-4 text-center">
          <span
            class="inline-flex items-center px-2.5 py-1 rounded-md text-xs font-bold bg-blue-50 text-blue-700 border border-blue-100"
          >
            <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
              <path
                d="M10 2a8 8 0 100 16 8 8 0 000-16zm1 11H9v-2h2v2zm0-4H9V5h2v4z"
              />
            </svg>
            Saldos al día
          </span>
        </td>
      </tr>
      <tr class="hover:bg-slate-50/50 transition-colors group hidden">
        <td class="px-6 py-4">
          <div class="flex items-center gap-3">
            <div
              class="h-10 w-10 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center border border-indigo-100"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-5 w-5"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
                />
              </svg>
            </div>
            <div class="flex flex-col">
              <span class="font-bold text-slate-700">Av. Las Palmas 402</span>
              <span class="text-xs text-slate-400 font-mono tracking-tight"
                >REF: UN-8902</span
              >
            </div>
          </div>
        </td>
        <td class="px-6 py-4">
          <span class="text-sm text-slate-600 font-medium">Residencial</span>
        </td>
        <td class="px-6 py-4">
          <div class="flex items-center gap-2">
            <div
              class="w-6 h-6 rounded-full bg-blue-100 flex items-center justify-center text-[10px] font-bold text-blue-700"
            >
              JD
            </div>
            <span class="text-sm text-slate-600">John Doe</span>
          </div>
        </td>
        <td class="px-6 py-4 text-center">
          <span
            class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800 border border-emerald-200"
          >
            Ocupada
          </span>
        </td>
        <td class="px-6 py-4 text-right">
          <div
            class="flex items-center justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity"
          >
            <button
              class="p-2 hover:bg-slate-200 text-slate-400 hover:text-slate-600 rounded-md transition-colors"
              title="Editar"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
                />
              </svg>
            </button>
            <button
              class="p-2 hover:bg-red-50 text-slate-400 hover:text-red-500 rounded-md transition-colors"
              title="Eliminar"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                class="h-4 w-4"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
              >
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"
                />
              </svg>
            </button>
          </div>
        </td>
      </tr>
    </tbody>
  </table>
</div>

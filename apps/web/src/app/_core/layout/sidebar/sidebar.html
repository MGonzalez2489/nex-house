<div class="flex flex-col h-full py-6">
  <div class="flex items-center px-6 mb-8">
    <img src="assets/logo-nexhouse.svg" alt="NexHouse" class="h-8 w-auto" />
    <span class="ml-3 text-xl font-bold text-blue-900">NexHouse</span>
  </div>

  <nav class="flex-1 px-4 space-y-1">
    @for (item of menuItems(); track item.label) {
    <a
      [routerLink]="item.path"
      routerLinkActive="bg-blue-50 text-blue-700"
      class="flex items-center px-4 py-3 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-100 transition-colors"
    >
      <i [class]="item.icon + ' mr-3 text-lg'"></i>
      {{ item.label }}
    </a>
    }
  </nav>
</div>

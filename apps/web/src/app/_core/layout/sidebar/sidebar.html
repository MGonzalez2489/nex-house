<aside
  class="sidebar"
  [class.sidebar--collapsed]="service.collapsed()"
  role="navigation"
  aria-label="Navegación principal"
>
  <!-- ── HEADER ────────────────────────────────── -->
  <div class="sidebar-header">
    <app-brand />

    <p-button
      (click)="service.toggleCollapsed()"
      text
      class="hidden"
      severity="secondary"
      [attr.aria-label]="
        service.collapsed() ? 'Expandir menú' : 'Colapsar menú'
      "
      [attr.aria-expanded]="!service.collapsed()"
      [icon]="
        service.collapsed() ? 'pi pi-chevron-right' : 'pi pi-chevron-down'
      "
    />
  </div>

  <!-- ── NAV ──────────────────────────────────── -->
  <nav class="sidebar-nav">
    @for (section of config().sections; track $index) {
      <div class="nav-section">
        @if (section.label && !service.collapsed()) {
          <div class="nav-section-label" role="presentation">
            {{ section.label }}
          </div>
        }
        @for (item of section.items; track item.id) {
          <app-nav-item [item]="item" />
        }
      </div>

      @if (!$last) {
        <div class="sidebar-divider" role="separator"></div>
      }
    }
  </nav>

  <!-- ── FOOTER ────────────────────────────────── -->
  <footer class="sidebar-footer">
    <!-- User card -->
    <div class="user-card" [class.user-card--collapsed]="service.collapsed()">
      <app-user-avatar [text]="user()?.fullName" />
      <div class="user-info">
        <span class="user-name">{{ user()?.fullName }}</span>
        <span class="user-role">{{ user()?.role | role }}</span>
      </div>
    </div>

    <div class="sidebar-divider sidebar-divider--footer" role="separator"></div>

    <a
      pButton
      icon="pi pi-question-circle"
      text
      [routerLink]="['/help']"
      severity="secondary"
      class="footer-item"
      label="Centro de ayuda"
    >
    </a>

    <button
      pButton
      class="footer-item footer-item--danger"
      (click)="sessionService.logout()"
      [attr.title]="service.collapsed() ? 'Cerrar sesión' : null"
      icon="pi pi-sign-out"
      label="Cerrar sesión"
    ></button>
  </footer>
</aside>

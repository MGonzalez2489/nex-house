<header
  class="bg-white border-b h-16 flex items-center justify-between px-4 lg:px-8"
>
  <div class="flex items-center">
    <p-button
      icon="pi pi-bars"
      class="lg:hidden"
      [text]="true"
      (onClick)="toggleSidebar.emit()"
    >
    </p-button>
  </div>

  <div class="flex items-center gap-4">
    <div class="hidden md:block text-right">
      <p class="text-sm font-semibold text-gray-900">{{ fName }}</p>
      <p class="text-xs text-gray-500">{{ role }}</p>
    </div>
    <p-button
      icon="pi pi-sign-out"
      severity="danger"
      [rounded]="true"
      [text]="true"
    >
    </p-button>
  </div>
</header>

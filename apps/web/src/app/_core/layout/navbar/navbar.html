<header
  class="bg-white/80 border-b border-slate-200 h-16 flex items-center justify-between lg:justify-end px-4 lg:px-8"
>
  <p-button
    icon="pi pi-bars"
    severity="secondary"
    text
    class="lg:hidden"
    (click)="toggleSidebar.emit()"
  />

  <div class="flex items-center gap-4">
    <div class="hidden md:block">
      <p-button icon="pi pi-bell" severity="secondary" text />
      <p-button icon="pi pi-question-circle" severity="secondary" text />
    </div>

    <div class="h-8 w-px bg-slate-200 mx-2 hidden md:block"></div>
    <div class="flex items-center gap-3 pl-2">
      @if(user(); as user){
      <app-user-avatar [text]="user.fullName" />

      <span class="text-sm hidden lg:block">{{user.email}}</span>
      }
    </div>
  </div>
</header>

<header
  class="bg-white/80 border-b border-slate-200 h-16 flex items-center justify-between px-4 lg:px-8"
>
  <div class="flex items-center gap-3">
    <p-button
      icon="pi pi-bars"
      severity="secondary"
      text
      class="lg:hidden"
      (click)="toggleSidebar.emit()"
    />
    <p
      class="capitalize font-semibold font-sans text-lg text-slate-700 w-64 md:w-80 truncate"
    >
      {{neighborhood()?.name}}
    </p>
  </div>

  <div class="flex items-center gap-4">
    <div class="hidden md:block">
      <p-button icon="pi pi-bell" severity="secondary" text />
      <p-button icon="pi pi-question-circle" severity="secondary" text />
    </div>

    <div class="h-8 w-px bg-slate-200 mx-2 hidden md:block"></div>
    <div class="flex items-center gap-3 pl-2">
      @if(user(); as user){
      <app-user-avatar [text]="user.fullName" />
      <div class="hidden lg:block">
        <p class="text-sm">{{user.email}}</p>
        <p class="text-xs text-slate-400">{{user.role | role}}</p>
      </div>
      }
    </div>
  </div>
</header>

<div class="flex h-screen overflow-hidden bg-gray-50">
  @if (sessionService.requireSideBar()) {
    <app-sidebar
      class="h-full hidden lg:flex lg:shrink-0"
      (logout)="sessionService.logout()"
    />
  }

  <div class="flex flex-col flex-1 w-0 overflow-hidden">
    <app-navbar (toggleSidebar)="sidebarVisible.set(true)" />

    <main class="flex-1 relative overflow-y-auto focus:outline-none p-4 lg:p-8">
      <div class="max-w-7xl mx-auto">
        @if (loadingContext()) {
          <div class="h-[80vh] flex flex-col justify-center items-center gap-5">
            <p-progress-spinner ariaLabel="loading" />
            <p class="text-slate-700">Loading...</p>
          </div>
        } @else {
          <router-outlet></router-outlet>
        }
      </div>
    </main>
  </div>
</div>

@if (sessionService.requireSideBar()) {
  <p-drawer
    [visible]="sidebarVisible()"
    class="lg:hidden"
    blockScroll="true"
    [closeOnEscape]="true"
    [pt]="{ root: 'w-16' }"
    (visibleChange)="this.sidebarVisible.set($event)"
  >
    <app-sidebar
      class="h-full"
      (logout)="sessionService.logout()"
      (navigate)="sidebarVisible.set(false)"
    />
  </p-drawer>
}
